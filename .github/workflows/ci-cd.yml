name: Django CI-CD Pipeline with uv

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your repository files into the runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Install uv and disable lockfile cache checks
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: false

    # 3. Pin your project's Python version
    - name: Set up Python
      run: uv python pin 3.11

    # 4. Install dependencies into the runner environment
    - name: Install Dependencies
      run: |
        uv pip install --system -r requirements.txt

    # 5. Perform a Django validation check (since there are no tests yet)
    - name: Run Django Sanity Check
      run: |
        uv run python manage.py check
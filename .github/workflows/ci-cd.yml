name: Django CI-CD Pipeline with uv

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Instantly link Python 3.11 from GitHub's built-in local cache (takes ~2 seconds)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Install uv package manager
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: false

    # 4. Create an isolated virtual environment and install your requirements
    - name: Install Dependencies
      run: |
        uv venv .venv
        uv pip install -r requirements.txt

    # 5. Run your Django validation check
    - name: Run Django Sanity Check
      run: |
        .venv/bin/python manage.py check --tag models --tag compatibility --tag security
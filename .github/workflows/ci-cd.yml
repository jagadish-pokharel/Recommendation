name: Django CI-CD Pipeline with uv

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your repository files into the runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Install uv but disable automatic lockfile cache validation
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: false # Instructs uv to skip looking for a uv.lock/pyproject.toml signature

    # 3. Pin your project's Python version
    - name: Set up Python
      run: uv python pin 3.11

    # 4. Install dependencies using uv's legacy pip-compatibility module
    - name: Install Dependencies
      run: |
        uv pip install -r requirements.txt

    # 5. Run your Django tests using the global virtual runner wrapper
    - name: Run Django Tests
      run: |
        python manage.py test
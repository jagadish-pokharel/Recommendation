name: Django CI-CD Pipeline with uv

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your repository files into the runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up Astral's ultra-fast 'uv' package manager with caching
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true 

    # 3. Pin your project's specific Python environment version
    - name: Set up Python
      run: uv python pin 3.11

    # 4. Install your Django and environment dependencies in one shot
    - name: Install Dependencies
      run: |
        uv sync

    # 5. Run your Django unit tests to make sure everything works perfectly
    - name: Run Django Tests
      run: |
        uv run python manage.py test